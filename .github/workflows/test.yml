name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-skill-parity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run skill parity validation
        run: node scripts/validate-skill-parity.mjs
